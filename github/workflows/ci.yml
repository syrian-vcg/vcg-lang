name: VCG CI/CD v1.0

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  # ── Build & Test ──────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC & Make
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make

      - name: Build compiler
        run: |
          make all
          chmod +x vcgc

      - name: Version check
        run: ./vcgc --version

      - name: Compile examples
        run: make examples

      - name: Run tests
        run: cd tests && bash run_tests.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vcgc-linux
          path: |
            vcgc
            output/*.html

  # ── GitHub Pages ──────────────────────────────────────────
  pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC & Make
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make

      - name: Build compiler & examples
        run: |
          make all
          chmod +x vcgc
          make examples

      - name: Build site structure
        run: |
          mkdir -p _site/assets _site/examples
          cp github/pages/index.html _site/index.html
          [ -f assets/icon.svg ]     && cp assets/icon.svg     _site/assets/ || true
          [ -f assets/icon.png ]     && cp assets/icon.png     _site/assets/ || true
          [ -f assets/icon_256.png ] && cp assets/icon_256.png _site/assets/ || true
          for f in output/*.html; do [ -f "$f" ] && cp "$f" _site/examples/ || true; done
          echo "=== Site contents ===" && find _site -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Release ───────────────────────────────────────────────
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: |
          sudo apt-get install -y gcc make
          make all
          chmod +x vcgc
      - name: Package
        run: |
          tar -czf vcg-lang-v1.0.0-linux-amd64.tar.gz \
            vcgc Makefile README.md LICENSE CHANGELOG.md \
            compiler/ examples/ tools/ assets/
      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: vcg-lang-v1.0.0-linux-amd64.tar.gz
