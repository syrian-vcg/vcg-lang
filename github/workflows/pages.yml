name: Deploy GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install GCC & Make
        run: sudo apt-get update -qq && sudo apt-get install -y gcc make

      - name: Build VCG compiler
        run: |
          make all
          chmod +x vcgc

      - name: Compile examples to HTML
        run: make examples || true

      - name: Build site folder
        run: |
          mkdir -p _site/assets _site/examples
          cp github/pages/index.html _site/index.html
          for f in icon.svg icon.png icon_256.png; do
            [ -f "assets/$f" ] && cp "assets/$f" "_site/assets/$f" || true
          done
          for f in output/*.html; do
            [ -f "$f" ] && cp "$f" "_site/examples/" || true
          done
          echo "Site ready:" && find _site -type f

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
