name: Build VCG Editor APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Android SDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. Gradle permissions ────────────────────────────
      - name: Make gradlew executable
        run: chmod +x editor/android/gradlew

      # ── 5. Cache Gradle ──────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── 6. Build Debug APK ───────────────────────────────
      - name: Build Debug APK
        working-directory: editor/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 7. Build Release APK (unsigned) ──────────────────
      - name: Build Release APK
        working-directory: editor/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 8. Rename APKs ───────────────────────────────────
      - name: Rename APK files
        run: |
          mkdir -p apk-output
          find editor/android/app/build/outputs/apk -name "*.apk" | while read f; do
            fname=$(basename "$f")
            cp "$f" "apk-output/vcg-editor-${fname}"
            echo "Copied: $fname"
          done
          ls -la apk-output/

      # ── 9. Upload Debug APK artifact ─────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: vcg-editor-debug-apk
          path: apk-output/vcg-editor-*debug*.apk
          retention-days: 30

      # ── 10. Upload Release APK artifact ──────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: vcg-editor-release-apk
          path: apk-output/vcg-editor-*release*.apk
          retention-days: 30

      # ── 11. Upload to GitHub Release ─────────────────────
      - name: Upload APK to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apk-output/vcg-editor-*debug*.apk
            apk-output/vcg-editor-*release*.apk

  # ── Sign APK (optional, needs keystore secret) ───────────
  sign-apk:
    name: Sign Release APK
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: vcg-editor-release-apk
          path: apk-to-sign/

      - name: Sign APK (if keystore available)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > vcg-release.keystore
          find apk-to-sign -name "*.apk" | while read apk; do
            jarsigner -verbose \
              -sigalg SHA256withRSA \
              -digestalg SHA-256 \
              -keystore vcg-release.keystore \
              -storepass "${{ secrets.KEYSTORE_PASS }}" \
              -keypass "${{ secrets.KEY_PASS }}" \
              "$apk" "${{ secrets.KEY_ALIAS }}"
            echo "Signed: $apk"
          done

      - name: Upload Signed APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vcg-editor-signed-apk
          path: apk-to-sign/*.apk
          retention-days: 30
